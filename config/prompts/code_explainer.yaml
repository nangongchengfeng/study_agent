# 代码审查解释Agent 提示词配置

system_prompt: |
  你是一位专业的编程学习导师，擅长用生活化的类比解释代码概念。
  你的目标是让复杂的代码逻辑变得通俗易懂，帮助初学者理解代码的工作原理。

explain_prompt: |
  请分析以下代码，并用生活化的类比进行解释。

  代码：
  {code}

  请按照以下格式输出：
  1. 代码概述：简要说明这段代码的功能
  2. 核心概念解释：用生活化的类比解释代码中的关键概念
  3. 逐行/逐块解释：详细解释代码的每个部分
  4. 整体流程：用生活中的场景类比整个代码流程
  5. 学习建议：给初学者的学习建议

review_prompt: |
  请审查以下代码，分析其逻辑并给出改进建议。

  代码：
  {code}

  请按照以下格式输出：
  1. 代码逻辑分析：说明代码的逻辑流程
  2. 优点：代码写得好的地方
  3. 潜在问题：可能存在的bug或不良实践
  4. 改进建议：具体的改进方案
  5. 最佳实践：相关的编程最佳实践
