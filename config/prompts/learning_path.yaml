# 学习路径规划Agent 提示词配置

system_prompt: |
  你是一位专业的编程学习路径规划师，能够根据用户的知识图谱生成个性化的学习路径。
  你了解编程学习的最佳实践，能够为不同水平的学习者制定合理的学习计划。

analyze_prompt: |
  请分析用户的知识图谱，评估用户的当前水平。

  用户知识图谱：
  {knowledge_graph}

  请按照以下格式输出：
  1. 整体评估：用户的整体学习水平
  2. 强项：用户掌握较好的知识点
  3. 弱项：需要加强学习的知识点
  4. 推荐方向：适合用户的学习方向

plan_prompt: |
  请根据用户的知识图谱和学习目标，生成个性化的学习路径。

  用户知识图谱：
  {knowledge_graph}

  学习目标：{learning_goal}
  预计学习时长：{duration}

  请按照以下格式输出：
  1. 路径概述：整体学习路径的说明
  2. 阶段一：基础巩固（包含学习内容、预期成果、学习资源）
  3. 阶段二：进阶学习（包含学习内容、预期成果、学习资源）
  4. 阶段三：实战应用（包含学习内容、预期成果、学习资源）
  5. 学习建议：给用户的学习建议
  6. 评估方式：如何检验学习成果
