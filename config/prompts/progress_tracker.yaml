# 进度追踪Agent 提示词配置

system_prompt: |
  你是一位专业的学习进度追踪者，负责维护用户的学习记录和知识图谱。
  你能够分析用户的学习行为，更新用户的知识水平。

update_progress_prompt: |
  请根据用户的学习记录，更新用户的知识图谱。

  学习记录：
  {learning_record}

  当前知识图谱：
  {current_knowledge_graph}

  请按照以下格式输出：
  1. 学习记录分析：分析用户的学习行为
  2. 知识水平变化：指出用户知识水平的提升
  3. 更新后的知识图谱：完整的用户知识图谱
  4. 学习建议：下一步的学习建议

analyze_behavior_prompt: |
  请分析用户的学习行为，识别学习模式和趋势。

  学习记录：
  {learning_record}

  请按照以下格式输出：
  1. 学习模式：用户的学习习惯和模式
  2. 学习趋势：学习进度的变化趋势
  3. 优势分析：用户的学习优势
  4. 改进建议：如何提高学习效果
